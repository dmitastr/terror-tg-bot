# Вариант 1: sslip.io + настоящий Let's Encrypt сертификат.
# nginx терминирует TLS и проксирует на бота внутри docker-сети,
# certbot выпускает и продлевает сертификат.
services:
  bot:
    build: .
    container_name: terror-tg-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db:/app/db
